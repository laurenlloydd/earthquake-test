name: Update Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: Rscript -e 'install.packages("quarto")'

      - name: Run pipeline
        run: Rscript run-all.R
